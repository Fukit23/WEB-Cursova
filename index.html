<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store</title>
    <link rel="stylesheet" href="css/styles.css?v=3">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border-radius: 8px;
            z-index: 1000;
            width: 300px;
        }
        .modal.active { display: block; }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .overlay.active { display: block; }
    </style>
</head>

<header>
    <div class="logo">AppFusion</div>
    <nav>
        <a href="#">Каталог</a>
    </nav>
    <div class="auth-menu" id="auth-menu"></div>
</header>

<main class="container" id="app-list"></main>

<div class="overlay" id="overlay" onclick="closeModals()"></div>

<div class="modal" id="loginModal">
    <div class="modal-close" onclick="closeModals()">✖</div>
    <h2>Вхід</h2>
    <form id="loginForm">
        <input type="email" id="log_email" placeholder="Email" required>
        <input type="password" id="log_password" placeholder="Пароль" required>
        <button type="submit">Увійти</button>
    </form>
    <div id="log_message" style="margin-top:10px; color:red;"></div>
</div>

<div class="modal" id="registerModal">
    <div class="modal-close" onclick="closeModals()">✖</div>
    <h2>Реєстрація</h2>
    <form id="registerForm" novalidate>
        <input type="text" id="reg_username" placeholder="Ім'я користувача" minlength="4" required>
        <input type="email" id="reg_email" placeholder="Email" required>
        <input type="password" id="reg_password" placeholder="Пароль" minlength="5" required>
        <select id="reg_role" required>
            <option value="user">Звичайний користувач</option>
            <option value="publisher">Видавець програм</option>
        </select>
        <button type="submit">Зареєструватися</button>
    </form>
    <div id="reg_message" style="margin-top:10px;"></div>
</div>

<div class="modal" id="addAppModal">
    <div class="modal-close" onclick="closeModals()">✖</div>
    <h2>Додати програму</h2>
    <form id="addAppForm">
        <input type="text" id="add_name" placeholder="Назва програми" required>
        <textarea id="add_description" placeholder="Опис" required style="width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box;"></textarea>
        
        <label style="display:block; margin-bottom:5px;">Іконка програми:</label>
        <input type="file" id="add_icon" accept="image/*" style="margin-bottom: 10px;">
        
        <div id="crop_container" style="display:none; max-width: 100%; max-height: 300px; margin-bottom: 15px;">
            <img id="image_preview" style="max-width: 100%; display: block;">
        </div>
        
        <label style="display:block; margin-bottom:5px;">Файл програми:</label>
        <input type="file" id="add_app_file" required style="margin-bottom: 15px;">
        
        <input type="number" step="0.01" id="add_price" placeholder="Ціна (₴)" required>
        
        <select id="add_age" required>
            <option value="0+">Вік: 0+</option>
            <option value="12+">Вік: 12+</option>
            <option value="16+">Вік: 16+</option>
            <option value="18+">Вік: 18+</option>
        </select>
        
        <select id="add_category" required>
            <option value="Games">Ігри</option>
            <option value="Tools">Утиліти</option>
        </select>
        
        <button type="submit">Опублікувати</button>
    </form>
    <div id="add_message" style="margin-top:10px; color:red;"></div>
</div>

<div class="modal" id="historyModal">
    <div class="modal-close" onclick="closeModals()">✖</div>
    <h2>Історія</h2>
    <div id="history-content">
        <div id="user-downloads">
            <h3>Ваші завантаження</h3>
            <ul id="downloads-list"></ul>
        </div>
        <div id="publisher-uploads" style="display:none; margin-top:20px;">
            <h3>Ваші опубліковані програми</h3>
            <ul id="uploads-list"></ul>
        </div>
    </div>
</div>

<script src="js/script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

</body>
</html>
