<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border-radius: 8px;
            z-index: 1000;
            width: 300px;
        }
        .modal.active { display: block; }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .overlay.active { display: block; }
    </style>
</head>

<header>
    <div class="logo">AppFusion</div>
    <nav>
        <a href="#">Каталог</a>
    </nav>
    <div class="auth-menu" id="auth-menu"></div>
</header>

<div style="text-align: center; margin: 20px 0; display: flex; flex-direction: column; align-items: center; gap: 15px;">
    <div style="display: flex; gap: 10px; justify-content: center;">
        <input type="text" id="searchInput" oninput="filterApps()" placeholder="Пошук..." style="padding: 10px; border-radius: 5px; font-size: 16px; border: 1px solid #ccc; width: 300px;">
        
        <select id="categoryFilter" onchange="filterApps()" style="padding: 10px; border-radius: 5px; font-size: 16px; border: 1px solid #ccc; cursor: pointer;">
            <option value="All">Всі категорії</option>
            <option value="Games">Ігри</option>
            <option value="Tools">Утиліти</option>
            <option value="Education">Освіта</option>
            <option value="Productivity">Продуктивність</option>
            <option value="Lifestyle">Стиль життя</option>
        </select>
    </div>
    
    <div style="display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; font-size: 14px; font-weight: bold; color: #777;">
        <div style="display: flex; gap: 15px;">
            <span style="color: #333;">Шукати:</span>
            <span class="search-tab active-tab" onclick="setSearchScope('all')" data-scope="all">Скрізь</span>
            <span class="search-tab" onclick="setSearchScope('name')" data-scope="name">За назвою</span>
            <span class="search-tab" onclick="setSearchScope('publisher')" data-scope="publisher">За видавцем</span>
        </div>
        
        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
            <span style="color: #333;">Сортувати:</span>
            <span class="sort-tab active-tab" onclick="setSortBy('date')" data-sort="date">За датою</span>
            <span class="sort-tab" onclick="setSortBy('rating')" data-sort="rating">За рейтингом</span>
            <span class="sort-tab" onclick="setSortBy('name')" data-sort="name">За назвою</span>
            <span class="sort-tab" onclick="setSortBy('publisher')" data-sort="publisher">За видавцем</span>
            <span class="sort-tab" onclick="setSortBy('price')" data-sort="price">За ціною</span>
        </div>
    </div>

    <div id="orderRow" style="display: flex; gap: 15px; font-size: 14px; font-weight: bold; color: #777; justify-content: center;">
        <span style="color: #333;">Порядок:</span>
        <span class="order-tab active-tab" onclick="setSortOrder('desc')" data-order="desc">За спаданням</span>
        <span class="order-tab" onclick="setSortOrder('asc')" data-order="asc">За зростанням</span>
    </div>
</div>

<main class="container" id="app-list"></main>

<div class="overlay" id="overlay" onclick="closeModals()"></div>

<div class="modal" id="loginModal">
    <div class="modal-close" onclick="closeModals()">✖</div>
    <h2>Вхід</h2>
    <form id="loginForm">
        <input type="email" id="log_email" placeholder="Email" required>
        <input type="password" id="log_password" placeholder="Пароль" required>
        <button type="submit">Увійти</button>
    </form>
    <div id="log_message" style="margin-top:10px; color:red;"></div>
</div>

<div class="modal" id="registerModal">
    <div class="modal-close" onclick="closeModals()">✖</div>
    <h2>Реєстрація</h2>
    <form id="registerForm" novalidate>
        <input type="text" id="reg_username" placeholder="Ім'я користувача" minlength="4" required>
        <input type="email" id="reg_email" placeholder="Email" required>
        <input type="password" id="reg_password" placeholder="Пароль" minlength="5" required>
        <select id="reg_role" required>
            <option value="user">Звичайний користувач</option>
            <option value="publisher">Видавець програм</option>
        </select>
        <button type="submit">Зареєструватися</button>
    </form>
    <div id="reg_message" style="margin-top:10px;"></div>
</div>


<div class="modal" id="walletModal">
    <div class="modal-close" onclick="closeModals()">✖</div>
    <h2>Поповнення балансу</h2>
    <form id="walletForm">
        <div style="display: flex; gap: 10px; margin-bottom: 15px; justify-content: center;">
            <button type="button" class="btn-main" style="width: auto;" onclick="document.getElementById('topup_amount').value = 50">50 ₴</button>
            <button type="button" class="btn-main" style="width: auto;" onclick="document.getElementById('topup_amount').value = 100">100 ₴</button>
            <button type="button" class="btn-main" style="width: auto;" onclick="document.getElementById('topup_amount').value = 500">500 ₴</button>
        </div>
        <input type="number" step="0.01" min="1" id="topup_amount" placeholder="Введіть суму" required>
        <button type="submit">Поповнити</button>
    </form>
</div>

<script src="js/script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

</body>
</html>
