<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Особистий кабінет</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
</head>
<body style="padding: 20px; background-color: #f4f7f6;">
    <button class="btn-main" style="margin-bottom: 20px; width: auto;" onclick="window.location.href='index.html'">🔙 Назад до магазину</button>
    
    <div style="display: flex; gap: 20px; max-width: 1000px; margin: auto; align-items: flex-start;">
        <div style="width: 250px; display: flex; flex-direction: column; gap: 10px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <button class="btn-main" style="background-color: #007bff;" onclick="openTab('t-profile')">Мій профіль</button>
            <button class="btn-main" style="background-color: #007bff;" onclick="openTab('t-edit-profile')">Редагувати дані</button>
            <button class="btn-main" style="background-color: #007bff;" onclick="openTab('t-downloads')">Завантаження</button>
            <button class="btn-main" id="btn-my-apps" style="display:none; background-color: #007bff;" onclick="openTab('t-my-apps')">Редагування програм</button>
        </div>
        
        <div style="flex-grow: 1; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            
            <div id="t-profile" class="tab-content">
                <h2 style="margin-top:0;">Профіль користувача</h2>
                <div style="font-size: 16px; line-height: 2;">
                    <p><strong>Ім'я користувача:</strong> <span id="info_username"></span></p>
                    <p><strong>Email-адреса:</strong> <span id="info_email"></span></p>
                    <p><strong>Тип акаунта:</strong> <span id="info_role"></span></p>
                </div>
            </div>

            <div id="t-edit-profile" class="tab-content" style="display:none;">
                <h2 style="margin-top:0;">Зміна даних</h2>
                <form id="profileForm">
                    <label>Ім'я користувача</label>
                    <input type="text" id="prof_username" required style="width:100%; margin-bottom:15px; padding:10px; box-sizing:border-box; border:1px solid #ccc; border-radius:4px;">
                    <label>Email</label>
                    <input type="email" id="prof_email" required style="width:100%; margin-bottom:15px; padding:10px; box-sizing:border-box; border:1px solid #ccc; border-radius:4px;">
                    <label>Новий пароль (залиште пустим, якщо не змінюєте)</label>
                    <input type="password" id="prof_password" style="width:100%; margin-bottom:20px; padding:10px; box-sizing:border-box; border:1px solid #ccc; border-radius:4px;">
                    <button type="submit" class="btn-main" style="width:auto;">Зберегти зміни</button>
                </form>
            </div>

            <div id="t-downloads" class="tab-content" style="display:none;">
                <h2 style="margin-top:0;">Історія завантажень</h2>
                <ul id="prof-downloads-list" style="list-style:none; padding:0;"></ul>
            </div>

            <div id="t-my-apps" class="tab-content" style="display:none;">
                <h2 style="margin-top:0;">Опубліковані програми</h2>
                <ul id="prof-uploads-list" style="padding:0; margin:0;"></ul>
                <div style="margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; text-align: right;">
                    <button class="btn-main" style="background-color: #28a745; width: auto;" onclick="openModal('addAppModal')">➕ Додати нову програму</button>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModals()"></div>

    <div class="modal" id="addAppModal" style="width: 450px; max-height: 90vh; overflow-y: auto;">
        <div class="modal-close" onclick="closeModals()">✖</div>
        <h2>Додати нову програму</h2>
        <div id="crop_container" style="display:none; text-align:center; margin-bottom:15px;">
            <img id="image_preview" style="max-width:100%; max-height:200px;">
        </div>
        <form id="addAppForm">
            <input type="text" id="add_name" placeholder="Назва програми" required style="width:100%; margin-bottom:10px; padding:8px; box-sizing:border-box;">
            <textarea id="add_description" placeholder="Опис" required style="width:100%; height:80px; margin-bottom:10px; padding:8px; box-sizing:border-box;"></textarea>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="text" id="add_version" placeholder="Версія (наприклад, 1.0.0)" required style="flex:1; padding:8px; box-sizing:border-box;">
                <input type="number" step="0.01" id="add_price" placeholder="Ціна (₴)" required style="flex:1; padding:8px; box-sizing:border-box;">
            </div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <select id="add_age" required style="flex:1; padding:8px;">
                    <option value="0+">Вік: 0+</option>
                    <option value="12+">Вік: 12+</option>
                    <option value="16+">Вік: 16+</option>
                    <option value="18+">Вік: 18+</option>
                </select>
                <select id="add_category" required style="flex:1; padding:8px;">
                    <option value="Games">Ігри</option>
                    <option value="Tools">Утиліти</option>
                    <option value="Education">Освіта</option>
                    <option value="Productivity">Продуктивність</option>
                    <option value="Lifestyle">Стиль життя</option>
                </select>
            </div>
            <label>Іконка програми:</label><br>
            <input type="file" id="add_icon" accept="image/*" required style="margin-bottom:10px;"><br>
            <label>Файл програми:</label><br>
            <input type="file" id="add_app_file" required style="margin-bottom:20px;"><br>
            <button type="submit" class="btn-main" style="width:100%;">Опублікувати</button>
        </form>
    </div>

    <div class="modal" id="editAppModal">
        <div class="modal-close" onclick="closeModals()">✖</div>
        <h2>Редагувати програму</h2>
        <form id="editAppForm">
            <input type="hidden" id="edit_app_id">
            <input type="text" id="edit_name" placeholder="Назва" required style="width:100%; margin-bottom:10px; padding:8px; box-sizing:border-box;">
            <textarea id="edit_description" required style="width:100%; margin-bottom:10px; padding:8px; box-sizing:border-box;"></textarea>
            <input type="number" step="0.01" id="edit_price" required style="width:100%; margin-bottom:10px; padding:8px; box-sizing:border-box;">
            <select id="edit_age" required style="width:100%; margin-bottom:10px; padding:8px; box-sizing:border-box;">
                <option value="0+">0+</option>
                <option value="12+">12+</option>
                <option value="16+">16+</option>
                <option value="18+">18+</option>
            </select>
            <select id="edit_category" required style="width:100%; margin-bottom:20px; padding:8px; box-sizing:border-box;">
                <option value="Games">Ігри</option>
                <option value="Tools">Утиліти</option>
                <option value="Education">Освіта</option>
                <option value="Productivity">Продуктивність</option>
                <option value="Lifestyle">Стиль життя</option>
            </select>
            <button type="submit" class="btn-main">Зберегти зміни</button>
        </form>
    </div>

    <div class="modal" id="addVersionModal">
        <div class="modal-close" onclick="closeModals()">✖</div>
        <h2>Додати нову версію</h2>
        <form id="addVersionForm">
            <input type="hidden" id="ver_app_id">
            <input type="text" id="ver_number" placeholder="Номер версії (наприклад, 1.1.0)" required style="width:100%; margin-bottom:10px; padding:8px; box-sizing:border-box;">
            <label>Файл нової версії:</label><br>
            <input type="file" id="ver_file" required style="margin-bottom:20px;"><br>
            <button type="submit" class="btn-main" style="width:100%;">Завантажити версію</button>
        </form>
    </div>

    <script src="js/profile.js"></script>
</body>
</html>
